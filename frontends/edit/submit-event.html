<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit an Event - DC Tech Events</title>
  <link rel="stylesheet" href="css/styles.css">
  <meta name="htmx-config" content='{"selfRequestsOnly": false}'>
</head>
<body>
  <nav class="nav">
    <div class="container" style="display:flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1100px;">
      <div style="display:flex; align-items: center; gap: 2rem;">
        <a href="/" class="nav-brand">DC Tech Events Edit</a>
        <ul class="nav-links" data-auth="admin" class="hidden">
          <li><a href="queue.html">Queue</a></li>
          <li><a href="events.html">Events</a></li>
          <li><a href="groups.html">Groups</a></li>
          <li><a href="categories.html">Categories</a></li>
          <li><a href="overrides.html">Overrides</a></li>
        </ul>
      </div>
      <div class="nav-right">
        <span data-auth="logged-in" class="hidden">
          <span data-user="name"></span>
          <button class="btn-sign-out" onclick="DctechAuth.logout()">Sign Out</button>
        </span>
      </div>
    </div>
  </nav>

  <main class="container">
    <h2>Submit an Event</h2>
    <p>Add a tech event happening in the DC area. Submissions are reviewed before publishing.</p>

    <div id="auth-section">
      <div class="auth-status" id="auth-status" data-auth="logged-out">
        <p>Not signed in</p>
        <button class="btn btn-primary" onclick="DctechAuth.login()">Sign In</button>
      </div>
    </div>

    <div id="form-response" class="response-area"></div>

    <form id="event-form" class="hidden" data-auth="logged-in"
          hx-post="/submit"
          hx-target="#form-response"
          hx-swap="innerHTML"
          hx-indicator="#submit-indicator"
          hx-on::after-request="if(event.detail.successful) this.reset()">
      <input type="hidden" name="type" value="event">

      <div class="form-group">
        <label for="event-name">Event Name <span class="required">*</span></label>
        <input type="text" id="event-name" name="name" required
               placeholder="e.g., DC Python Meetup - February 2026">
      </div>

      <div class="form-group">
        <label for="event-url">Event URL <span class="required">*</span></label>
        <input type="url" id="event-url" name="url" required
               placeholder="https://www.meetup.com/...">
        <div class="form-hint">Link to the event page (Meetup, Eventbrite, etc.)</div>
      </div>

      <div class="form-group">
        <label for="event-description">Description</label>
        <textarea id="event-description" name="description" class="form-control"
                  placeholder="Brief description of the event..."></textarea>
      </div>

      <div class="form-group">
        <label for="event-start">Start Date &amp; Time <span class="required">*</span></label>
        <input type="datetime-local" id="event-start" name="start_datetime" class="form-control" required>
      </div>

      <div class="form-group">
        <label for="event-end">End Date &amp; Time</label>
        <input type="datetime-local" id="event-end" name="end_datetime" class="form-control">
      </div>

      <div class="form-group">
        <label for="event-location">Location</label>
        <input type="text" id="event-location" name="location" class="form-control"
               placeholder="e.g., WeWork White House, 1440 G St NW, Washington, DC">
        <div class="form-hint">Physical address or "Online" for virtual events</div>
      </div>

      <div class="form-group">
        <label for="event-group">Organizing Group</label>
        <input type="text" id="event-group" name="group_name" class="form-control"
               placeholder="e.g., DC Python">
      </div>

      <div class="form-group">
        <label>Categories</label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="categories" value="ai"> AI/ML</label>
          <label><input type="checkbox" name="categories" value="cloud"> Cloud</label>
          <label><input type="checkbox" name="categories" value="cybersecurity"> Cybersecurity</label>
          <label><input type="checkbox" name="categories" value="data"> Data</label>
          <label><input type="checkbox" name="categories" value="design"> Design</label>
          <label><input type="checkbox" name="categories" value="devops"> DevOps</label>
          <label><input type="checkbox" name="categories" value="frontend"> Frontend</label>
          <label><input type="checkbox" name="categories" value="general"> General</label>
          <label><input type="checkbox" name="categories" value="hardware"> Hardware</label>
          <label><input type="checkbox" name="categories" value="mobile"> Mobile</label>
          <label><input type="checkbox" name="categories" value="networking"> Networking</label>
          <label><input type="checkbox" name="categories" value="open-source"> Open Source</label>
          <label><input type="checkbox" name="categories" value="policy"> Policy</label>
          <label><input type="checkbox" name="categories" value="programming"> Programming</label>
          <label><input type="checkbox" name="categories" value="startup"> Startup</label>
          <label><input type="checkbox" name="categories" value="web"> Web</label>
        </div>
      </div>

      <div class="form-group">
        <button type="submit" class="btn btn-primary">
          <span class="htmx-indicator" id="submit-indicator"><span class="spinner"></span></span>
          Submit Event
        </button>
      </div>
    </form>
  </main>

  <style>
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
    .form-group input[type="text"],
    .form-group input[type="url"],
    .form-group input[type="datetime-local"],
    .form-group textarea {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .form-hint { font-size: 0.85rem; color: #666; margin-top: 0.25rem; }
    .required { color: red; }
    .checkbox-group {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.5rem;
    }
    .checkbox-group label { font-weight: normal; display: flex; align-items: center; gap: 0.5rem; }
    .response-area { margin-bottom: 1.5rem; }
    .spinner {
      display: inline-block;
      width: 1rem; height: 1rem;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
    .htmx-request.btn-primary { pointer-events: none; opacity: 0.8; }
  </style>

  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="js/auth.js"></script>
  <script>
    DctechAuth.requireAuth();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events - DC Tech Events Edit</title>
  <link rel="stylesheet" href="/css/styles.css">
  <meta name="htmx-config" content='{"selfRequestsOnly": false}'>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="/js/auth.js"></script>
</head>
<body>
  <nav class="nav">
    <div class="container">
      <div style="display:flex; align-items: center; gap: 2rem;">
        <a href="/" class="nav-brand">DC Tech Events Edit</a>
        <ul class="nav-links" data-auth="admin">
          <li><a href="/queue.html">Queue</a></li>
          <li><a href="/events.html" class="active">Events</a></li>
          <li><a href="/groups.html">Groups</a></li>
          <li><a href="/categories.html">Categories</a></li>
          <li><a href="/overrides.html">Overrides</a></li>
        </ul>
      </div>
      <div class="nav-right">
        <span data-auth="logged-in" class="hidden">
          <span data-user="name" id="user-info"></span>
          <button class="btn-sign-out" onclick="DctechAuth.logout()">Sign Out</button>
        </span>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="page-header">
      <h1>Events</h1>
      <p>Browse and manage events in the system.</p>
    </div>

    <div class="card">
      <div class="toolbar">
        <div class="filters-bar">
          <span class="toolbar-label">Filters</span>
          <div style="display:flex; align-items:center; gap: 8px;">
            <input type="text" id="date-filter" name="date" class="form-control"
                   placeholder="e.g. 2026-03" style="width:110px">
            <label style="display:flex; align-items:center; gap: 4px; font-size: 0.85rem; cursor: pointer; user-select: none;">
              <input type="checkbox" id="include-past" name="include_past" value="true">
              Include Past
            </label>
            <button class="btn btn-primary btn-sm"
                    hx-get="/admin/events"
                    hx-target="#events-table"
                    hx-include="#date-filter, #active-filter, #include-past"
                    hx-indicator="#events-loading">
              Filter
            </button>
          </div>

          <div style="width: 1px; height: 24px; background: var(--color-border);"></div>

          <button class="btn btn-outline btn-sm"
                  hx-get="/admin/events"
                  hx-vals='{"filter": "uncategorized"}'
                  hx-target="#events-table"
                  hx-include="#date-filter, #include-past"
                  hx-indicator="#events-loading">
            Uncategorized
          </button>

          <button class="btn btn-sm" style="background:transparent; border:none; color: var(--color-primary); padding: 0;"
                  onclick="document.getElementById('date-filter').value=''; document.getElementById('include-past').checked=false;"
                  hx-get="/admin/events"
                  hx-target="#events-table"
                  hx-indicator="#events-loading">
            Clear Filters
          </button>
        </div>
      </div>

      <div id="events-loading" class="htmx-indicator" style="padding: 2rem; text-align: center;">
        <div class="spinner" style="margin: 0 auto 1rem; width: 2rem; height: 2rem;"></div>
        <p>Loading events...</p>
      </div>

      <div id="events-table">
        <!-- Content loaded via HTMX -->
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (DctechAuth.requireAdmin()) {
        loadEvents();
      }
    });

    function loadEvents() {
      const el = document.getElementById('events-table');
      const token = DctechAuth.getIdToken();

      if (!token) return;

      htmx.ajax('GET', '/admin/events', {
        target: '#events-table',
        swap: 'innerHTML',
        headers: {'Authorization': 'Bearer ' + token},
      });
    }
  </script>
</body>
</html>

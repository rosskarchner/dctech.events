<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pending Submissions - DC Tech Events Admin</title>
  <link rel="stylesheet" href="/css/styles.css">
  <meta name="htmx-config" content='{"selfRequestsOnly": false}'>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="/js/auth.js"></script>
</head>
<body>
    <nav class="nav">
    <div class="container" style="display:flex; justify-content: space-between; align-items: center; width: 100%; max-width: 1100px;">
      <div style="display:flex; align-items: center; gap: 2rem;">
        <a href="/" class="nav-brand">DC Tech Events Edit</a>
        <ul class="nav-links" data-auth="admin">
          <li><a href="/queue.html">Queue</a></li>
          <li><a href="/events.html">Events</a></li>
          <li><a href="/groups.html">Groups</a></li>
          <li><a href="/categories.html">Categories</a></li>
          <li><a href="/overrides.html">Overrides</a></li>
        </ul>
      </div>
      <div class="nav-right">
        <span data-auth="logged-in" class="hidden">
          <span data-user="name"></span>
          <button class="btn-sign-out" onclick="DctechAuth.logout()">Sign Out</button>
        </span>
      </div>
    </div>
  </nav>

  <main class="container">
    <div class="page-header flex justify-between items-center">
      <div>
        <h1>Pending Submissions</h1>
        <p>Review and approve or reject user-submitted events.</p>
      </div>
      <button class="btn btn-outline"
              hx-get="/admin/queue"
              hx-target="#queue-list"
              hx-indicator="#queue-loading">
        Refresh
      </button>
    </div>

    <div class="card">
      <div id="queue-loading" class="htmx-indicator">
        <span class="spinner"></span> Loading queue...
      </div>

      <div id="queue-list"
           hx-get="/admin/queue"
           hx-trigger="load">
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      DctechAuth.requireAdmin();
    });
  </script>
</body>
</html>

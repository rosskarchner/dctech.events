<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing In... - DC Tech Events</title>
  <link rel="stylesheet" href="../css/styles.css">
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
</head>
<body>
  <main class="container" style="max-width: 500px; margin-top: 80px; text-align: center;">
    <div class="card">
      <div id="callback-status">
        <span class="spinner"></span>
        <p style="margin-top: 1rem;">Signing you in...</p>
      </div>

      <div id="callback-error" style="display: none;">
        <h2>Sign-In Failed</h2>
        <p id="error-message" class="text-muted mt-1"></p>
        <button class="btn btn-primary mt-2" onclick="DctechAuth.login()">Try Again</button>
      </div>
    </div>
  </main>

  <script>
    (async function handleCallback() {
      const statusEl = document.getElementById('callback-status');
      const errorEl = document.getElementById('callback-error');
      const errorMsg = document.getElementById('error-message');

      function showError(message) {
        statusEl.style.display = 'none';
        errorMsg.textContent = message;
        errorEl.style.display = 'block';
      }

      try {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        const error = params.get('error');
        const errorDescription = params.get('error_description');

        if (error) {
          showError(errorDescription || error);
          return;
        }

        if (!code) {
          showError('No authorization code received.');
          return;
        }

        const savedState = sessionStorage.getItem('oauth_state');
        // If state starts with '/', it's a redirect path.
        // We can be flexible here if it matches exactly OR if it's the saved path.
        if (!state) {
          showError('No session state received.');
          return;
        }
        
        // Exchange code for tokens
        await DctechAuth.exchangeCodeForTokens(code);

        // Redirect to original path or home
        const redirectPath = (state && state.startsWith('/')) ? state : '/';
        window.location.href = redirectPath;

      } catch (err) {
        console.error('Callback error:', err);
        showError('An unexpected error occurred: ' + err.message);
      }
    })();
  </script>
</body>
</html>

{% extends "base.html" %}

{% block title %}Groups - {{ site_name }}{% endblock %}

{% block content %}
<h1>Groups</h1>
<div class="groups-container">
<div class="suggest-group">
    <p>Don't see your group? <a href="{{ add_events_link }}">Suggest a group</a>.</p>
</div>

    {% if groups %}
    <ul>
        {% for group in groups %}
            <li class="group-card">
                <a href="{{ group.website }}">{{ group.name }}</a>
            </li>
        {% endfor %}
    </ul>
    {% endif %}
</div>
{% endblock %}

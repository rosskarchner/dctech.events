description: 'On the second Thursday of every month, Refraction opens its doors for a FREE day of AI collaboration, innovation, and connection.

🚨 Join us for the Refraction AI Exchange on August 13!

On the second Thursday of every month, Refraction opens its doors for a FREE day of AI collaboration, innovation, and connection — hosted from the top of the Valo Park tech campus in Tysons.

What to expect throughout the day:

▶️ Opportunities for high-value networking, collaboration, and innovation

▶️ Applied AI programming, hands-on workshops, and community discussion

▶️ A vibrant community where AI founders, operators, innovators, students, and ecosystem builders can connect

As part of this month’s AI Exchange, Refraction will also be hosting two special complimentary programs:

▶️ Midday Program | 12:00–1:00 pm
Byte-Sized Lunch Lab
A hands-on applied AI workshop where participants bring lunch and a laptop, then leave with a working prototype using today’s AI and no-code tools.

▶️ Evening Program | 6:00–8:00 pm
“Evolving with AI” Panel Discussion & Networking Event
In this complimentary evening program, organized by the Penn State Alumni Association of Metro Washington, DC, in partnership with the Penn State College of Information Sciences and Technology, panelists will explore how AI is evolving across accessibility, productivity, operations, and sales.'

Whether you are building or investing in applied AI, intelligent automation, enterprise AI tools, public-sector AI, or other emerging technologies, the AI Exchange offers free access to:

Community & Space to Innovate  —  Enjoy Refraction’s award-winning, 30,000-square-foot innovation hub and startup support community, conveniently located atop the trophy-class Valo Park complex in Tysons (9:00 am to 5:00 pm)
Programming & Networking  —  Take part in a full day of AI-focused networking and programming opportunities'

description: 'Join us every Tuesday at Refraction Innovation Hub for Community Tuesdays — our open-door, no-cost program offering career resources, professional connections, and access to our award-winning, collaborative community of founders, funders, and innovators in the heart of Northern Virginia’s tech corridor.

Whether you are in a career transition, considering starting your own business, or simply startup-curious, Refraction offers an inclusive and resource-rich space where you can:

Work Onsite for FREE from 9:00 am to 5:00 pm
Receive FREE, Personalized & AI Resume Revision Support & Job Search Resources
Receive FREE Startup Idea Validation Assistance & Business Plan Development Support
Take Advantage of Our FREE Networking Opportunities for Aspiring Entrepreneurs & Career Changers

Register now to attend this in-person event series  — or keep reading to learn more about this program, our Local Resource Hub for Job Seekers, and our free downloadable guide for jobseekers: "Advanced Tools and Resources for Job Seekers in 2025." '

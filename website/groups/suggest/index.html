<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suggest a Group - DC Tech Events</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <!-- HTMX for dynamic content loading -->
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/common.js"></script>
    <style>
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .loading-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top: 4px solid #0066cc;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Suggest a Tech Group</h1>
        
        <!-- This div will be replaced with the form content from the API -->
        <div id="form-container" 
             hx-get="https://api.dctech.events/api/groups/suggest-form" 
             hx-trigger="load"
             hx-target="#form-container"
             hx-swap="outerHTML">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading form...</p>
            </div>
        </div>
    </div>

    <script>

    </script>
</body>
</html>

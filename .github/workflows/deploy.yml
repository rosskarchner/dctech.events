name: Deploy Infrastructure and Site

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 9 * * *' # 9:00 AM UTC is 4:00 AM EST
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: "deploy"
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}

jobs:
  deploy-infra:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json

      - name: Set up QEMU for cross-platform builds
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-infra

      - name: Install Infrastructure dependencies
        run: |
          cd infrastructure
          npm ci

      - name: Deploy Stacks via CDK
        env:
          DOCKER_BUILDKIT: '1'
        run: |
          cd infrastructure
          npx cdk deploy --all --require-approval never

  rebuild-site:
    needs: [deploy-infra]
    if: always() && (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Cache iCal and JSON-LD data
        uses: actions/cache@v4
        with:
          path: _cache
          key: ical-cache-${{ hashFiles('_groups/**') }}-${{ steps.date.outputs.date }}
          restore-keys: |
            ical-cache-${{ hashFiles('_groups/**') }}-

      - name: Refresh Calendars
        run: calgen refresh

      - name: Generate Event Data
        run: calgen pipeline

      - name: Build Static Site
        run: calgen build

      - name: Prepare GitHub Pages artifact
        run: |
          rm -rf pages
          mkdir -p pages
          mkdir -p pages/edit
          cp -a build/. pages/
          cp -a frontends/edit/. pages/edit/
          printf 'dctech.events\n' > pages/CNAME

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy-pages:
    needs: rebuild-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

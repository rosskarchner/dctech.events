name: Deploy Infrastructure and Site

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 9 * * *' # 9:00 AM UTC is 4:00 AM EST
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: "deploy"
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  SITE_BUCKET: dctech-events-site-1768361440101
  CACHE_BUCKET: dctech-events-data-cache

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      workflow: ${{ steps.filter.outputs.workflow }}
      site: ${{ steps.filter.outputs.site }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'infrastructure/**'
            frontend:
              - 'frontends/**'
            backend:
              - 'backend/**'
              - 'lambdas/**'
            workflow:
              - '.github/workflows/**'
            site:
              - 'templates/**'
              - 'app.py'
              - 'freeze.py'
              - 'generate_*.py'
              - 'refresh_calendars.py'
              - '_groups/**'
              - '_categories/**'
              - 'static/**'

  deploy-infra:
    needs: changes
    if: needs.changes.outputs.infra == 'true' || needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json

      - name: Set up QEMU for cross-platform builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-infra

      - name: Install Infrastructure dependencies
        run: |
          cd infrastructure
          npm ci

      - name: Deploy Stacks via CDK
        env:
          DOCKER_BUILDKIT: '1'
        run: |
          cd infrastructure
          npx cdk deploy --all --require-approval never

  deploy-frontend-app:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-deploy-frontend

      - name: Sync Frontend Apps to S3
        run: |
          echo "Syncing edit.dctech.events..."
          aws s3 sync frontends/edit/ s3://dctech-events-edit-frontend/ --delete

      - name: Invalidate CloudFront Cache
        run: |
          echo "Finding CloudFront Distribution ID for edit.dctech.events..."
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Aliases.Items && contains(Aliases.Items, 'edit.dctech.events')].Id" --output text)
          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
          fi

  rebuild-site:
    needs: [changes, deploy-infra]
    if: |
      always() && 
      (needs.changes.outputs.site == 'true' || needs.changes.outputs.backend == 'true' || 
       needs.changes.outputs.infra == 'true' || needs.changes.outputs.workflow == 'true' ||
       github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-rebuild-site

      - name: Sync Cache from S3
        run: |
          aws s3 sync s3://${{ env.CACHE_BUCKET }}/_cache _cache || echo "No cache found"
          aws s3 sync s3://${{ env.CACHE_BUCKET }}/_data _data || echo "No data found"

      - name: Refresh Calendars
        run: python refresh_calendars.py

      - name: Generate Month Data
        run: python generate_month_data.py

      - name: Build Static Site
        run: python freeze.py

      - name: Deploy to S3
        run: |
          aws s3 sync build/ s3://${{ env.SITE_BUCKET }}/ --delete
          aws s3 sync _data/ s3://${{ env.SITE_BUCKET }}/_data/ --delete

      - name: Sync Cache to S3
        run: |
          aws s3 sync _cache s3://${{ env.CACHE_BUCKET }}/_cache --delete
          aws s3 sync _data s3://${{ env.CACHE_BUCKET }}/_data --delete

      - name: Invalidate CloudFront
        run: |
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Aliases.Items && contains(Aliases.Items, 'dctech.events')].Id" --output text)
          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*"
          fi

name: Auto-merge Calendar QC PRs

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    if: contains(github.event.pull_request.title, '[calendar-qc]')
    runs-on: ubuntu-latest
    steps:
      - name: Squash-merge calendar QC PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --squash --yes "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"

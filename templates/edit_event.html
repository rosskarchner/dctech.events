{% extends "base.html" %}

{% block title %}Edit Event - {{ site_name }}{% endblock %}
{% block robots %}<meta name="robots" content="noindex, nofollow">{% endblock %}

{% block content %}
<div class="container">
    <h2>Edit Event</h2>

    <div id="source-info" class="source-info">
        <!-- Populated by JavaScript -->
    </div>

    <form id="edit-event-form">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" name="title">
        </div>

        <div class="form-group">
            <label for="url">URL</label>
            <input type="url" id="url" name="url">
        </div>

        <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" name="date">
        </div>

        <div class="form-group">
            <label for="time-hour">Time</label>
            <input type="number" id="time-hour" name="time-hour" min="0" max="23" placeholder="HH">
        </div>

        <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" name="city">
        </div>

        <div class="form-group">
            <label>Categories</label>
            <div id="category-checkboxes">
                {% for slug, category in categories.items() %}
                <label>
                    <input type="checkbox" name="categories" value="{{ slug }}">
                    {{ category.name }}
                </label>
                {% endfor %}
            </div>
        </div>

        <button type="submit" id="submit-edit">Save Changes</button>
    </form>

    <div id="edit-status"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/dist/edit.bundle.js" defer></script>
{% endblock %}
